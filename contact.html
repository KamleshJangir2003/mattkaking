<!DOCTYPE html>
<html lang="en-in">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Contact Us | DPBOSS</title>
<link rel="stylesheet" href="style.css">
<style>
.page-content{background:#fc9;padding:10px;text-align:left;}
.page-title{background:#ff00a2;padding:8px 10px;color:#fff;border-radius:8px;font-size:20px;margin-bottom:10px;border:2px solid #fff;text-align:center;}
.back-btn{display:inline-block;background:#039;color:#fff;padding:6px 14px;border-radius:6px;margin-bottom:10px;font-size:14px;}
.contact-box{border:2px solid #ff182c;border-radius:10px;padding:15px;margin-bottom:10px;background:#fff;}
.contact-box h3{color:#d3003f;font-size:16px;margin-bottom:8px;}
.contact-box p{color:#00094d;font-size:14px;line-height:2;}
.contact-box a{color:#522f92;font-weight:bold;}
input,textarea{width:100%;padding:8px;margin:5px 0 10px;border:2px solid #ff182c;border-radius:6px;font-size:14px;background:#fff;}
.submit-btn{background:#ff0016;color:#fff;border:none;padding:10px 30px;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>
<div class="m-icon">
  <a href="index.html"><img src="img/logo.png" alt="dpboss logo" height="57" width="292"></a>
</div>
<div class="page-content">
  <a href="index.html" class="back-btn">← Back to Home</a>
  <div class="page-title">Contact Us - DPBOSS</div>
  <div class="contact-box">
    <h3>Get In Touch</h3>
    <p>📧 Email: <a href="mailto:support@dpboss.net">support@dpboss.net</a></p>
    <p>🌐 Website: dpbossss.boston</p>
    <p>⏰ Support Hours: 24/7</p>
  </div>
  <div class="contact-box">
    <h3>Send Message</h3>
    <input type="text" placeholder="Your Name" />
    <input type="email" placeholder="Your Email" />
    <textarea rows="4" placeholder="Your Message"></textarea>
    <button class="submit-btn" onclick="alert('Message sent!')">Send Message</button>
  </div>
  <p style="color:#888;font-size:12px;margin-top:10px;">&copy; 2011 - 2026 dpbossss.boston</p>
</div>
</body>
</html>
